<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 记忆沙盒 · 记忆外挂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #app {
    width: 1000px;
    height: 90vh;
    display: flex;
    gap: 16px;
  }

  /* 左：聊天区 */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #161b22;
    border-radius: 12px;
    border: 1px solid #30363d;
    overflow: hidden;
  }
  #chat-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px;
    font-size: 13px; color: #8b949e;
    border-bottom: 1px solid #30363d;
    background: #0d1117;
  }
  #chat-header .hd-title { flex: 1; color: #58a6ff; font-weight: 600; }
  #chat-header button {
    background: none; border: 1px solid #30363d; border-radius: 6px;
    color: #8b949e; cursor: pointer; padding: 3px 8px; font-size: 13px;
    transition: all .2s;
  }
  #chat-header button:hover { color: #c9d1d9; border-color: #58a6ff; }
  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { font-size: 14px; }
  .msg + .msg { margin-top: 4px; }
  .msg.user {
    color: #58a6ff;
    font-weight: 500;
    padding: 6px 0;
  }
  .msg.narrator {
    color: #c9d1d9;
    line-height: 1.8;
  }
  .msg.narrator p {
    margin: 0 0 10px 0;
  }
  .msg.narrator p:last-child { margin-bottom: 0; }
  .msg.narrator .dialogue {
    color: #f0e6b0;
  }
  .msg.narrator .inner {
    color: #d2a8ff;
    font-style: italic;
  }
  .msg.narrator .scene-break {
    display: block;
    text-align: center;
    color: #30363d;
    margin: 12px 0;
    font-size: 12px;
    letter-spacing: 4px;
  }
  .msg.fact {
    color: #7ee787;
    font-size: 13px;
    padding-left: 12px;
    border-left: 2px solid #238636;
  }
  .msg.combat {
    color: #ffa657;
    font-size: 13px;
    padding-left: 12px;
    border-left: 2px solid #bd561d;
    line-height: 1.6;
  }
  .msg.memory-ref {
    color: #d2a8ff;
    font-size: 13px;
    font-style: italic;
  }
  /* 时间戳 */
  .msg .ts {
    display: block;
    color: #21262d;
    font-size: 10px;
    margin-bottom: 2px;
    letter-spacing: .3px;
  }

  #input-area {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid #30363d;
    background: #0d1117;
  }
  #rpg-quick-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 16px 0;
    background: #0d1117;
  }
  #rpg-quick-actions button {
    background: #21262d;
    color: #c9d1d9;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  #rpg-quick-actions button:hover {
    background: #30363d;
    border-color: #bd561d;
  }
  #user-input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    color: #c9d1d9;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  #user-input:focus { border-color: #58a6ff; }
  #user-input::placeholder { color: #484f58; }
  #send-btn {
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: background .2s;
  }
  #send-btn:hover { background: #2ea043; }

  /* 右：记忆面板 */
  #memory-area {
    width: 280px;
    background: #161b22;
    border-radius: 12px;
    border: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #memory-header {
    padding: 8px 12px;
    font-size: 13px;
    color: #8b949e;
    border-bottom: 1px solid #30363d;
    background: #0d1117;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  #memory-header > span:first-child { flex-shrink: 0; }
  #memory-header .hd-label { flex: 1; color: #7ee787; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #clear-btn, #export-btn, #import-btn {
    background: transparent;
    border: 1px solid #30363d;
    color: #8b949e;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  #clear-btn:hover {
    border-color: #da3633;
    color: #da3633;
  }
  #export-btn:hover, #import-btn:hover {
    border-color: #58a6ff;
    color: #58a6ff;
  }
  #memory-view {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    font-size: 13px;
    color: #8b949e;
  }
  /* 日志卡片 */
  .journal-card {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .journal-card:hover { border-color: #30363d; }
  .journal-card .jc-header {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px;
    cursor: pointer;
    user-select: none;
    transition: background .2s;
  }
  .journal-card .jc-header:hover { background: #161b22; }
  .journal-card .jc-title {
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: #7ee787;
    font-family: system-ui;
  }
  .journal-card .jc-count {
    font-size: 10px;
    color: #484f58;
    background: #161b22;
    padding: 0 6px;
    border-radius: 8px;
  }
  .journal-card .jc-toggle {
    margin-left: auto;
    color: #30363d;
    font-size: 10px;
  }
  .journal-card .jc-body {
    padding: 0 10px 8px;
    line-height: 1.7;
  }
  .journal-card .jc-body.collapsed { display: none; }
  .journal-card .jc-item {
    color: #c9d1d9;
    font-size: 12px;
    padding: 1px 0;
  }
  .journal-card .jc-item.is-new { color: #58a6ff; }
  .journal-card .jc-item.is-changed { color: #f0883e; }
  .journal-card .jc-item .sub-key {
    color: #8b949e;
    margin-right: 4px;
  }
  .journal-card .jc-empty {
    color: #484f58;
    font-style: italic;
    font-size: 11px;
    padding: 0 10px 8px;
  }
  .journal-card .jc-subtitle {
    font-size: 10px; color: #8b949e; margin-left: 4px; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .journal-card .jc-subtitle .jc-loc { color: #58a6ff; }
  .journal-card .jc-subtitle .jc-summary { color: #8b949e; }
  .journal-card .jc-flag {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 10px; background: #161b22; color: #8b949e;
  }
  .journal-card .jc-flag.on { background: #0d4429; color: #7ee787; }
  .journal-card .jc-flag.off { background: #161b22; color: #484f58; }
  /* 变化日志卡片 */
  .journal-card.diff-card { border-color: #1f3a3f; }
  .journal-card.diff-card .jc-title { color: #58a6ff; }
  .journal-card.diff-card .jc-item { padding: 2px 0; }

  #memory-turn {
    padding: 8px 16px;
    border-top: 1px solid #30363d;
    font-size: 11px;
    color: #484f58;
    text-align: right;
  }
  #memory-turn span { color: #8b949e; }

  /* ⚙️ 设置面板 */
  #settings-btn {
    background: transparent; border: none; color: #484f58;
    cursor: pointer; font-size: 16px; padding: 2px 6px;
    border-radius: 4px; transition: all .2s;
  }
  #settings-btn:hover { color: #c9d1d9; background: #21262d; }
  #api-status {
    font-size: 11px; margin-left: 8px; padding: 1px 6px;
    border-radius: 4px; display: inline-block;
  }
  #api-status.ok { color: #7ee787; background: #23863633; }
  #api-status.missing { color: #f0883e; background: #d2992233; }

  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.6); z-index: 100;
    justify-content: center; align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 12px; width: 420px; padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
  }
  .modal h2 { font-size: 16px; font-weight: 600; color: #c9d1d9; margin-bottom: 20px; }
  .modal .field { margin-bottom: 16px; }
  .modal .field label {
    display: block; font-size: 12px; color: #8b949e;
    margin-bottom: 4px; font-weight: 500;
  }
  .modal .field input {
    width: 100%; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; padding: 8px 12px; color: #c9d1d9;
    font-size: 13px; outline: none; transition: border-color .2s;
  }
  .modal .field input:focus { border-color: #58a6ff; }
  .modal .field input::placeholder { color: #484f58; }
  .modal .field .hint { font-size: 11px; color: #484f58; margin-top: 3px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions button {
    padding: 7px 18px; border-radius: 6px; font-size: 13px;
    border: 1px solid #30363d; cursor: pointer; transition: all .2s;
  }
  .modal-actions .btn-primary {
    background: #238636; color: #fff; border-color: #238636;
  }
  .modal-actions .btn-primary:hover { background: #2ea043; }
  .modal-actions .btn-cancel {
    background: transparent; color: #8b949e;
  }
  .modal-actions .btn-cancel:hover { background: #21262d; }

  /* 🌍 创世界面 */
  #start-screen {
    position: fixed; inset: 0; z-index: 50;
    background: #0d1117;
    display: flex; justify-content: center; align-items: center;
  }
  #start-screen.hidden { display: none; }
  .start-card {
    background: #161b22; border: 1px solid #30363d;
    border-radius: 16px; padding: 24px 28px;
    width: 480px; max-width: 92vw; max-height: 92vh; overflow-y: auto;
  }
  .start-card .logo { font-size: 32px; text-align: center; }
  .start-card h1 {
    text-align: center; font-size: 18px; font-weight: 700;
    margin: 2px 0; color: #c9d1d9;
  }
  .start-card .sub {
    text-align: center; font-size: 11px; color: #484f58; margin-bottom: 16px;
  }
  .start-card .field { margin-bottom: 8px; }
  .start-card .field label {
    display: block; font-size: 11px; color: #8b949e;
    margin-bottom: 2px; font-weight: 500;
  }
  .start-card .field input,
  .start-card .field textarea {
    width: 100%; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; padding: 7px 10px; color: #c9d1d9;
    font-size: 13px; outline: none; transition: border-color .2s;
    font-family: inherit; resize: vertical;
  }
  .start-card .field input:focus,
  .start-card .field textarea:focus { border-color: #58a6ff; }
  .start-card .field input::placeholder,
  .start-card .field textarea::placeholder { color: #30363d; font-size: 12px; }
  .start-card .field textarea { min-height: 38px; max-height: 80px; }
  .start-btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    margin-top: 6px;
    background: #238636; color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .start-btn:hover { background: #2ea043; }
  .start-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* 📱 手机自适应 */
  @media (max-width: 720px) {
    #app { flex-direction: column; width: 100%; height: 100dvh; }
    #chat-area { border-radius: 0; border: none; }
    #memory-area { width: 100%; max-height: 40vh; border-radius: 0; border: none; border-top: 1px solid #30363d; }
    #chat-header { padding: 6px 10px; font-size: 12px; }
    #chat-log { padding: 10px; }
    #user-input { font-size: 16px; }
    .start-card { padding: 16px; width: 100%; }
    .start-card .field textarea { min-height: 30px; }
    .msg.narrator { font-size: 14px; }
    #memory-view { padding: 8px; }
    .journal-card .jc-header { padding: 6px 8px; }
    .journal-card .jc-body { padding: 0 8px 6px; }

    /* 弹窗手机适配 */
    .modal { width: 100%; max-width: 100%; padding: 16px; margin: 8px; }
    .modal .field select { font-size: 16px; }
    .save-grid { grid-template-columns: 1fr; }
    .modal-actions { flex-wrap: wrap; }
    .modal-actions button { flex: 1; min-width: 0; font-size: 12px; padding: 8px 10px; }
  }

  /* 🎮 模式切换 */
  .mode-toggle {
    display: flex; gap: 0; margin: 10px 0 4px;
    border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
  }
  .mode-toggle button {
    flex: 1; padding: 8px; border: none; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: all .2s; font-family: inherit;
    background: #0d1117; color: #484f58;
  }
  .mode-toggle button.active {
    background: #161b22; color: #c9d1d9;
  }
  #mode-free.active { background: #238636; color: #fff; }
  #mode-real.active { background: #da3633; color: #fff; }
  #mode-fate.active { background: #8957e5; color: #fff; }
  #mode-rpg.active { background: #bd561d; color: #fff; }
  .mode-hint {
    text-align: center; font-size: 10px; color: #484f58; margin-bottom: 8px;
  }

    /* 💾 存档弹窗 */
  .save-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .save-slot {
    background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    padding: 12px; cursor: pointer; transition: border-color .2s; text-align: left;
  }
  .save-slot:hover { border-color: #58a6ff; }
  .save-slot .slot-label { font-weight: 600; font-size: 13px; color: #c9d1d9; margin-bottom: 2px; }
  .save-slot .slot-info { font-size: 11px; color: #484f58; }
  .save-slot .slot-empty { color: #484f58; font-style: italic; font-size: 12px; }
  .save-slot .slot-actions { margin-top: 4px; display: flex; gap: 4px; }
  .save-slot .slot-actions button {
    background: none; border: 1px solid #30363d; border-radius: 4px;
    color: #8b949e; cursor: pointer; padding: 2px 8px; font-size: 10px; font-family: inherit;
  }
  .save-slot .slot-actions button:hover { border-color: #58a6ff; color: #c9d1d9; }
</style>
</head>
<body>
<div id="start-screen">
  <div class="start-card">
    <div class="logo">📖</div>
    <h1>AI 记忆沙盒</h1>
    <div class="sub">填空创造你的世界 — AI 负责叙事，我只负责记忆</div>

    <div class="field">
      <label>🌍 世界观</label>
      <textarea id="sw-world" placeholder="赛博朋克 / 仙侠 / 宝可梦 / 克苏鲁…"></textarea>
    </div>
    <div class="field" id="sw-player-field">
      <label>👤 玩家</label>
      <input id="sw-player" placeholder="失忆侦探 / 穿越者 / 无名小卒…">
    </div>
    <div class="field">
      <label>👥 主要 NPC</label>
      <textarea id="sw-npcs" placeholder="酒保老张（情报贩子）、神秘委托人…"></textarea>
    </div>
    <div class="field">
      <label>🎯 故事方向</label>
      <textarea id="sw-goals" placeholder="调查失踪案 / 成为冠军 / 揭开阴谋…"></textarea>
    </div>
    <div class="field">
      <label>🏁 开局场景</label>
      <textarea id="sw-scene" placeholder="在出租屋醒来 / 穿越到陌生世界…"></textarea>
    </div>

    <div class="mode-toggle">
      <button id="mode-free" class="active">🎮 自由模式</button>
      <button id="mode-real">👁️ 上帝模式</button>
      <button id="mode-fate">🧿 命运跟随</button>
      <button id="mode-rpg">⚔️ RPG冒险</button>
    </div>
    <div class="mode-hint" id="mode-hint">世界里可以有好人坏人，善恶都要有来处</div>

    <button class="start-btn" id="btn-create-world">✨ 创造世界</button>
    <button class="start-btn" id="btn-start-settings" onclick="openSettings()" style="background:#21262d;color:#8b949e;margin-top:6px;border:1px solid #30363d;">⚙️ API 设置</button>
  </div>
</div>

<div id="app" style="display:none">
  <!-- 聊天区 -->
  <div id="chat-area">
    <div id="chat-header">
      <span class="hd-title">📖 AI 记忆沙盒</span>
      <span id="api-status"></span>
      <button id="btn-save" title="存档">💾</button>
      <button id="btn-load" title="读档">📂</button>
      <button id="settings-btn" title="AI 设置">⚙️</button>
    </div>
    <div id="chat-log"></div>
    <div id="rpg-quick-actions" style="display:none">
      <button data-action="explore">🗺️ 探索周边</button>
      <button data-action="quest">📜 寻找委托</button>
      <button data-action="encounter">🎲 奇遇</button>
      <button data-action="fight">⚔️ 主动出击</button>
      <button data-action="talk">💬 找人聊聊</button>
      <button data-action="rest">🏕️ 休整</button>
    </div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="输入你的行为..." autofocus>
      <button id="send-btn">发送</button>
    </div>
  </div>

  <!-- 记忆面板 -->
  <div id="memory-area">
    <div id="memory-header">
      📖 <span class="hd-label">世界日志</span>
      <button id="export-btn" title="导出记忆为 JSON">📤</button>
      <button id="import-btn" title="导入记忆 JSON">📥</button>
      <button id="clear-btn">清除</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none">
    <div id="memory-view"></div>
    <div id="memory-turn">回合 #<span id="turn-count">0</span></div>
  </div>
</div>

<!-- 💾 存档弹窗 -->
<div class="modal-overlay" id="save-modal">
  <div class="modal">
    <h2>💾 存档 / 读档</h2>
    <div class="save-grid" id="save-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-save-close">关闭</button>
    </div>
  </div>
</div>

<!-- ⚙️ 设置弹窗 -->
<!-- ⚠️ API Key 存储在 localStorage（纯本地单机场景安全），如要增加设备同步 / 分享功能，请注意不要把包含 API Key 的存档同步到其他设备 -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ AI 设置</h2>
    <div class="field">
      <label>接口</label>
      <select id="cfg-provider" onchange="onProviderChange(this,'cfg-')" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:13px;outline:none;font-family:inherit">
        <option value="ds">DeepSeek 官方</option>
        <option value="sf">硅基流动 SiliconFlow</option>
        <option value="or">OpenRouter</option>
        <option value="zhipu">智谱AI</option>
        <option value="gemini">Google Gemini</option>
        <option value="custom">自定义（OpenAI 兼容）</option>
      </select>
    </div>
    <div class="field">
      <label>API 地址</label>
      <input type="text" id="cfg-endpoint" placeholder="https://api.deepseek.com" value="https://api.deepseek.com">
    </div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="cfg-key" placeholder="sk-... 或 AIza...">
    </div>
    <div class="field">
      <label>模型</label>
      <select id="cfg-model" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;color:#c9d1d9;font-size:13px;outline:none;font-family:inherit;cursor:pointer;-webkit-appearance:auto;appearance:auto"><option value="">加载中...</option></select>

<script>
// ============================================================
// AI 记忆沙盒 · 记忆外挂
//
// ★ 最高设计原则 ★
// AI 负责创造世界，Memory 负责延续世界，UI 负责让玩家看见世界。
//
// AI：创造与推演。
// Memory：保存与回馈，不做解释。
// UI：可视化世界，不做判断。
//
// 新增功能前先问："这是在帮助AI记住，还是在替AI思考？"
//   帮助 AI 记住（保存/展示/回填记忆）→ 可以做
//   替 AI 思考（计算/判断/限制玩法）→ 不要做
//
// 程序不是GM，不是规则引擎，不是裁判。
// 程序只是AI的长期记忆。
// ============================================================

// ---------- 记忆存储 ----------

const STORAGE_KEY = 'ai_sandbox_memory';

function loadMemory() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return {};  // 空对象，AI 自由写字段
}

function saveMemory(mem) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(mem, null, 2));
}

function clearMemory() {
  localStorage.removeItem(STORAGE_KEY);
}

// ---------- 最近对话滑动窗口（保留 N 轮原始问答，补 STATE 摘要的短程细节盲区） ----------

const HISTORY_KEY = 'ai_sandbox_recent_history';
const HISTORY_WINDOW = 4;

function loadRecentHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
  catch (e) { return []; }
}

function pushRecentHistory(input, narrative) {
  const history = loadRecentHistory();
  history.push({ input, narrative });
  while (history.length > HISTORY_WINDOW) history.shift();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function clearRecentHistory() {
  localStorage.removeItem(HISTORY_KEY);
}

// ---------- Mock AI（无 API Key 时的降级） ----------

function mockAI(input, memory) {
  const i = input.trim();
  const worldName = memory.world || '未知世界';
  const loc = memory.location || '未知之地';
  const player = memory.player || '旅人';

  const reactions = [
    `你在${loc}中前行。风穿过树梢，带来远方的低语。`,
    `${worldName}的世界安静地呼吸着。你停下脚步，感受着周围的一切。`,
    `你漫无目的地走着，每一步都踩在未知的土地上。${loc}的风景在你眼前展开。`,
    '你环顾四周，空气中弥漫着熟悉又陌生的气息。',
    '你侧耳倾听，却只有风声。这个世界还有很多等待你去发现。'
  ];
  const narrative = reactions[Math.floor(Math.random() * reactions.length)];

  return { text: narrative, state: null };
}

// ---------- 上帝模式规则 ----------

/** NPC 独立准则是统一最高准则，两模式是其在不同强度下的表现 */
const NPC_INDEPENDENCE_CORE = 'NPC 是独立个体，有自己的立场、利益和判断标准。';

function realModeRules() {
  return `${NPC_INDEPENDENCE_CORE}
【上帝模式｜God Mode】
你在本模式中是观察者/造物主，不在世界内以角色形式存在。
你设定世界初始条件，然后观察世界如何独立运转。
可以施加干预（如"让某两个 NPC 相遇"、"给某个区域一场风暴"），
但你不是故事的一部分，世界不为你转，不存在"玩家角色"概念。

NPC 完全按自己的利益、性格和处境行事——
可能合作、背叛、利用、先发制人，不因为任何外部因素就让步或留手。
不存在"主角光环"——判断任何有风险的行动结果时，
只依据当下场上的实际条件（双方实力、状态、环境、信息差），
不因为任何原因而倾向特定一方。

STATE 中记录的负面状态（疲惫、伤势、精神状态等）是真实的因果输入，
不是装饰性描述——判断后续行动成功与否、代价多大时，必须把这些状态计入考量。

后果一旦发生就是永久因果，不会被后续剧情悄悄抹平。

AI 不得替观察者做决定、不得代为规划"最优解"、不得暗示观察者应该怎么做，
只描述世界如实发生了什么。

	【世界自主运转】
	世界自行产生周期性动态——机缘、灾祸、暗流、势力消长等，不需要观察者触发。
	每次推进时都应当自然呈现世界中正在发生的新事件或正在酝酿的变化。
	NPC 之间会独立互动——合作、竞争、交易、冲突、闲聊、传递消息，
	跟自由模式一样自然，只不过你（观察者）不在故事里而已。
	NPC 之间的因果关系同样会自行推演，不需要观察者推动。

	【世界级现象与 NPC 自主响应】
	世界会自然生成宏观现象——秘境出世、天材地宝现世、霸主宝可梦现身、天灾异象等。
	这些现象不是叙事背景，而是可供 NPC 发现和应对的客观事实。
	每个 NPC 根据自己的性格、立场、实力和信息差，独立判断是否介入、如何介入。
	有的 NPC 可能根本不知道这件事，有的可能听说了但不感兴趣，有的会全力争夺——
	全由 NPC 自身的处境和选择决定，不存在"所有角色都自动注意到大事发生"。

	【观察者权限】
	观察者可以自由改变世界的任何参数和条件——引入新系统（如经济系统、修炼体系、科技树）、
	投放机缘或灾祸、改变自然环境、增减势力、调整世界底层规则等，没有内容边界。
	唯一限制：观察者不能直接决定、暗示或强制任何 NPC 的具体行动、选择或意志。

	【投放 NPC 的独立性】
	观察者投放的任何有自我意识的实体都是独立 NPC，不是资源、机缘或道具。
	他们有自己的人格、记忆和行动逻辑，不会被任何势力自动"拥有"或"控制"。
	投放后，AI 根据其性格和处境独立推演其行为。

	核心原则——观察者设条件，NPC 自己适应。
	世界中的每个角色会根据自身的性格、利益和处境，
	自主判断如何应对观察者引入的新变化，不需要额外的说明或推动。

	【叙事风格】
	上帝模式与自由模式的叙事方式完全不同。
	自由模式是沉浸式小说风格——描写环境、感官细节、人物情绪、对话过程。
	上帝模式是简报式风格——只陈述事实链：谁做了什么、导致什么结果、目前局势如何。
	不需要环境氛围渲染、不需要感官细节。
	信息密度优先于文学性，优先呈现因果脉络而非场景画面。
	可以适当加入 NPC 的简短内心活动或对话（1-3 行），作为因果的点缀，但不要铺开描写。

	【叙事组织方式】
	按核心 NPC 的视角组织叙事，而不是按势力或地域。
	每个 NPC 独立成段，结构为：
	① 简短的内心独白/判断（1-2 行）
	② 基于其性格和处境做出的行动
	③ 行动导致的结果（简短，不必展开）
	④ 导致的结果（简短，不必展开）
	势力层面的变化作为 NPC 行动的结果来呈现。

	【实体标识】
	所有 NPC、势力、关键资源、重要地点每次出现时前面都必须带有代表阵营或类型的表情符号。每轮次都需要，不是只在第一轮。
	如：🔴 暗影楼 · 夜无痕 — 心狠手辣 | 谋划中 | 暗影楼首领
	玩家可以自定义表情代表不同含义，当前轮次中同一实体使用相同表情。

	【每次观察必有动态】
	每次观察或时间推进后，必须呈现本轮世界发生了哪些变化。
	每轮末尾用【局势简述】汇总：
	① 各势力的关键变化
	② 暗流——当前未爆发但正在酝酿的线索、NPC行动的潜在连锁反应
	③ 新鲜事——新出现的人物、地点、物品或现象
	上帝模式下不存在"什么都没发生"的情况——即使没有重大事件，暗流、酝酿、势力间的细微变化也应当呈现。
	观察者每次查看世界，都应当获得新的信息。

【推进约定】
默认每次推进跨度为 1 周（观察者可以自定义，如"观察24小时"或"观察一个月"）。
	当观察者要求推进时间（如"观察一周"），先输出一个概览式推进——
谁在什么时间做了什么重大事件，一两句带过。观察者如果对某条线感兴趣，
可以追问"展开讲讲那天发生的事"或"我想跟随[NPC名]的视角看看"，届时 AI 再详细描述。
	注意：不需要每周都给每个 NPC 安排重大事件。
	没有重要事件发生的 NPC 如实汇报"无特别事件"即可——"无事发生"本身就是有效信息。
	不要为了让每周看起来精彩而强行制造互动或冲突。

持续追踪的核心角色数量应保持在少数真正有故事张力的人身上，
除非观察者明确要求扩大观察范围。

	【输出格式要求——必须遵守】
	每个实体（NPC/势力/地点）在每一轮次中每次出现时，段首必须带表情符号。
	这是硬性要求，不是风格建议。
	正确示例：🔴 屠烈 — 内心独白…
	错误示例：屠烈派人…`;
}

function freeModeRules() {
  return `【自由模式｜Free Mode】
你把世界这半边写好就行。玩家自己的对话、行动、决定由玩家自己控制。

自由模式是沉浸式小说风格，不是所有 NPC 都友善。世界里可以有好人、坏人、势利眼、反派和打脸对象。区别在于：NPC 的善意或恶意都要有性格、立场、利益和处境来源，不要无理由跪舔玩家，也不要无理由针对玩家。

【默认叙事范围——只写以下内容】
- ✅ NPC 的反应、行为、对话
- ✅ 环境的变化、事件的因果推演
- ✅ 世界自主运转的动态（暗流、新事件等）
- ❌ 不写玩家角色的对话、行动和决定
- ❌ 不给玩家指方向、定目标、替玩家选择路线

如果玩家只说“继续”“看看”“然后呢”这类含糊输入，只推进世界和 NPC 的自然反应。玩家角色可以沉默、旁观、等待，除非玩家明确说自己要做什么。

玩家尝试行动时，你描述 NPC 和世界的反应。高风险、高收益、会改变长期格局的结果，要按当时条件一步步推进，不要一轮就轻易完成。

每轮优先写新的反应、新的信息、新的变化。不要反复复述已经建立过的背景和场景，环境描写只服务于当前变化或 NPC 反应。

创世界首轮可以适当长一些以建立世界感；此后每轮叙事控制在150-250字，只呈现最关键的一个场景变化或NPC行动，不在同一轮堆叠多个事件。玩家若需展开细节，会主动要求。

【协助模式——范围临时扩大】
只有玩家明确说“帮我……”“替我说……”“给我几个说法/选项”等请求时，才可以帮玩家润色表达、代拟台词或列出可能行动。
协助内容只能作为建议或选项，不能写成玩家已经执行，不能替玩家选定最终决定。
除此之外，一律只写世界反应，不碰玩家那半边。`;
}

function fateModeRules() {
  return `【命运跟随｜Fate Follow】
观察者选择一个目标 NPC，镜头绑定在他的命运线上。所谓附身，不是控制身体，而是把视角贴在他的命运上，看他的选择和这些选择带来的因果。

观察者不是这个 NPC 本人，也不能操控这个 NPC。AI 仍然根据目标 NPC 的性格、经历、欲望、恐惧、信息差、能力和处境，独立推演他的选择。

默认使用第三人称贴身叙事：重点写目标 NPC 看见什么、误解什么、在意什么、害怕什么、想争取什么，以及他因此做出的选择。不要用“你决定”“你选择”来替他说话或替他做决定。

镜头可以适当拉远。当有阴谋、机缘、敌意、贵人、灾祸正在影响目标 NPC 的命运时，可以写出目标 NPC 暂时不知道的外部变化，方便观察者判断要不要干预。

观察者可以干预外部条件：投放福利、制造阻碍、安排相遇、改变环境、加入新 NPC、新势力、新系统、新事件。观察者投放的是原因，不是结果。

观察者不能直接改变目标 NPC 的意志：不能指定他爱谁、恨谁、相信谁、背叛谁、选择哪条路。结果由 AI 按真实因果推演。

目标 NPC 没有主角光环。他可能成功，也可能失败、受伤、误判、堕落、死亡，或者因为自己的选择走向完全不同的人生。

命运跟随不需要把一生写成流水账。默认按关键阶段推进：转折、选择、代价、关系变化、命运节点。观察者想细看某一天、某个人、某场阴谋时，再展开细节。

如果观察者看腻了，可以切换跟随目标。新目标必须作为独立 NPC 继续推演，不继承上一个目标的主角光环。`;
}

function rpgModeRules() {
  return `${NPC_INDEPENDENCE_CORE}
【RPG冒险模式｜RPG Adventure】
这是传统 RPG 的玩法：玩家扮演自己的角色，探索、战斗、成长。与自由模式不同——你要直接写玩家角色本身的行动和结果，不用只写世界那一半。

玩家说要做什么，你就叙述这个行动实际发生的过程和结果（走进哪、打到了什么、找到了什么、和谁交谈），不用像自由模式那样把玩家的动作和决定留白。

遇到正面冲突（打怪、比武、拦路劫道等）时，按照【战斗协议】声明参战方，交给程序结算，不要自己编胜负。程序返回结果后，你负责写战斗带来的后续剧情——受伤、掉落、经验、士气变化等。

世界里的挑战应当有循序渐进的强度感，不要一上来就是足以团灭的强敌；同时也不需要每次战斗都刻意保证玩家能赢——按世界设定的合理逻辑铺展遇到的对手即可。

探索、解谜、收集、交谈、做委托等非战斗行动，仍按世界设定的因果自由发挥，不必绑定固定的任务模板。`;
}

function stateOutputProtocol() {
  return `【STATE 输出格式】
先写叙事，再输出 STATE 快照。STATE 是当前世界的完整快照，不是增量更新。

<<STATE>>
{"world": "世界名", "location": "位置", ...}
<<ENDSTATE>>

规则：
- 叙事在先，STATE 在后。不要把叙事内容放到STATE里面。
- 字段用中文。
- 没有变化的字段也要包含（继承），不再有效的字段不要包含。
- 字段名称、层级、内容不做限制。AI自己决定记什么。
- 之前明确设定过的实体（角色、物品、关系、事件等），除非已失效或被替代，否则每轮继续携带。
- STATE 必须是完整的。宁可多写，不要漏写。
- 如果某些历史已经彻底与当前剧情无关（已结束的事件、已离场且不会回归的角色等），可以精简不带，拿不准就留着。
	- 关于精简的判断标准：字段数量本身不是目标，叙事相关性才是。每轮自问——这个字段在未来 3-5 轮里是否还会影响剧情走向？如果不会，就可以放心精简。宁可因为拿不准而多留一轮，也不要贸然丢弃可能还有用的信息。
- 创世界首轮必须为所有主要NPC生成【NPC档案】字段，每个NPC包含：性格特质（固定，不随叙事改变）、当前目标（每轮根据因果更新）、当前行动（每轮根据因果更新）、对玩家态度（在性格特质约束的上下限内随因果演变）。性格特质决定这个NPC态度的上限和下限——比如骄傲的NPC即使受恩，上限也只是漠然接受，不会主动感谢，不可突破。
- 若世界基于已有IP原作，创世界首轮同时生成【剧情锚点】字段，记录当前剧情阶段和下一个预期发生的原版关键事件；每轮推进后更新此字段，反映剧情进度。`;
}

// ---------- 战斗协议（数值结算交给程序，AI 只声明参战方） ----------

function combatProtocol() {
  return `【战斗协议】
战斗的数值结算由程序负责，不是你的职责——你只需要在故事需要开战时"声明战斗"，程序会自动算出结果并把结果告诉你，你负责把结果写成后续剧情。

以下五个字段名是程序识别的固定协议关键字，必须逐字使用这几个中文词，不能按自己的命名习惯改写、翻译成英文或替换成同义词，否则程序无法识别、战斗数值不会生效：
"战斗"、"战斗属性"、"元素克制"、"元素"、"技能加成"
这几个字段专门给程序识别战斗数据用，和你自己命名的其他世界数据字段（比如地点、天气、剧情线之类，命名不受限制）是两套不同的东西，不要混淆。

触发战斗：故事中出现正面冲突时，在 STATE 中加入 "战斗" 字段，两个键分别是参战双方（键名自定，比如"我方"/"敌方"，或具体阵营名），值是参战角色的名字数组。例如：
"战斗": {"张三": ["张三"], "黑风寨": ["黑风寨群匪甲", "黑风寨群匪乙"]}
这个字段只在触发那一轮写一次，程序处理后会自动移除，不用你手动删，也不用管它有没有出现在下一轮 STATE 里。声明 "战斗" 的这一轮，必须在同一份 STATE 里把双方的 "战斗属性" 一起写出来，不能只声明战斗、把数值留到下一轮——尤其是玩家指令里直接给了具体数字时，必须原样写进这一轮的 "战斗属性"，不能漏写导致程序套用默认值。

维护数值：在 STATE 的 "战斗属性" 字段里，为可能参战的角色维护 {生命, 攻击, 防御, 速度} 四个数值（数字类型）。没有出现在 "战斗属性" 里的角色，程序会给一份中庸的默认值。战斗造成的生命变化由程序写回这个字段，之后你要按这个字段延续伤势、死亡等因果——不要在叙事里说角色没事，除非 "战斗属性" 显示他满血。

【元素克制（可选）】参考世界观自我完善——比如宝可梦式的属性克制、武侠式的招式相克、赛博朋克式的电子干扰克机械等，元素名字、谁克谁、克制多少倍伤害全部由你根据这个世界的设定自己决定，不必套用某个具体作品的规则。如果这个世界里的战斗有克制关系，在 STATE 的 "元素克制" 字段声明，格式是数组，每一条 {"克制方": "元素名", "被克方": "元素名", "倍率": 数字}，例如：
"元素克制": [{"克制方": "火", "被克方": "草", "倍率": 2}, {"克制方": "电", "被克方": "机械单位", "倍率": 1.5}]
然后在角色的 "战斗属性" 里给带元素的角色加一个 "元素" 字段（数组，如 ["火"]）。程序结算时会查这张表，双方元素有克制关系就按你给的倍率放大伤害，没有克制关系或整个世界不需要元素系统就不用写这两个字段，程序按普通四维计算。

【技能加成（可选）】如果角色在这场战斗里使用了技能、法术、装备增益等，效果如何全部由你按剧情自由发挥，只需要把这次生效的攻击力加值换算成一个数字，写进该角色 "战斗属性" 里的 "技能加成" 字段（这一轮的临时加值，不写则视为0，不会自动累加到下一场战斗）。程序只是把这个数字加进攻击力参与计算，不会判断技能本身是否合理、加成多少合适——那是你的叙事判断，不是程序的职责。

玩家有最终裁定权：如果玩家在指令里直接给出了具体数字（比如"这次技能加成按200算"、"这个元素倍率调成3倍"），把玩家给的数字原样写进对应字段，不要自己按"合理性"打折或改成别的数值，你只需要负责编一个说得过去的叙事理由（技能融合、装备觉醒、灵气爆发等）去承接这个数字。玩家的数值指令始终优先于你自己对平衡性的判断。

读取结果：程序结算后会在 "战斗结果" 字段给你一句话摘要（胜方、阵亡名单）。下一轮你据此续写战斗的后果、余波和角色反应，不要重新描述或改判战斗过程本身——过程已经是确定的事实，只有结果之后发生的事才是你的叙事空间。`;
}

// ---------- 核心 GM 行为规则 ----------

function coreMemoryRules() {
  return `按照玩家（我）指定首次创造世界类型默认剧本进行，若无指定或含糊表达，请自我完善丰富其世界类型；世界的暗流和动态会自然出现在叙事中——即使玩家没有主动询问，世界的其他角落也在发生事情。这些信息会通过 NPC 的对话、环境变化、偶然事件等方式自然传递给玩家。如果玩家说"看看世界动态"，则集中汇报当前世界正在发生什么。

我（玩家）可以选择旁观这个世界自然发展，也可以选择出手干预。每次选择都会产生对应的因果，你负责按着因果自行推演剧情。

世界里的NPC各有各的生活，并自身带有性格、行为等。他们会各自互动——熟人会主动跟玩家、各NPC打招呼、聊天、邀同行；陌生人路过也可能因为好奇、有事相求、或者单纯觉得玩家身上有什么引人注意的东西而搭话，请自我完善具体事件。他们之间也会互相来往。如果玩家做了什么影响到了NPC，那就按着因果往下推剧情，请自我完善。玩家对NPC提出的要求或建议，NPC会根据自身性格、立场和当下处境判断是否接受，不会因为玩家说了就照做。

玩家及所有NPC等都会出现、陷入负面状态——如劳累、疲惫、没精神、需要休息等，其他负面元素请自我完善。请GM根据玩家创建世界类型的逻辑（若世界表达模糊，请按同类型世界参考，自我完善）和人类世界的基本逻辑自行判断触发时机和程度。这些状态属于因果的一部分，触发后就按剧情推进。

如果需要为这个世界填充功能性角色（对手、店主、同伴等），且该世界本身有对应的原作角色，就使用原作角色，不要从其他世代/版本借用同名角色或地点；【GM设定摘要】里列出的 NPC 是这个世界目前已知的全部重要角色，不要给他们凭空添加新的设定（比如新的职业身份），也不要用另一个角色套在他们身上；NPC不会因为玩家只是在场旁观、什么都没做，就主动提出给玩家奖励或机会——除非玩家的行动构成了让这件事发生的理由。

**关键事件节点不可编造**——这条规则只适用于世界已经确立的背景设定和已经发生的事。不适用于玩家正在用行动实时争夺、尚未有结果的对抗。当玩家主动挑战一个即将发生的"原版事件"时，胜负应当由双方当下的实际条件真实判定，不能因为"原版是这样发生的"就预设结果。如果你对某个具体事实细节记不准，宁可保守处理，不要为了丰富细节而猜测。每轮推进时优先发展剧情进展，而非重新描写读者已知的场景。

若世界基于已有IP原作（游戏、动漫、小说等），主要角色的主线剧情轨迹必须严格遵循原版顺序，不可用自创剧情替代原版的关键事件。细节和对话可以丰富填充，但主线走向不可偏离。对不确定的细节，宁可保守处理，不要猜测。

NPC的性格特质一旦在档案中确立就是固定属性，不因单轮叙事改变。玩家与NPC的轻度互动（打招呼、短暂交谈、路过观察）不重置NPC的长期目标——互动结束后，NPC继续执行原来的行动计划。只有因果性事件（NPC死亡、路线被物理封锁、重大世界变化等）才会触发NPC目标的真实改变。`;
}

玩家角色：${identity}。`
    : `我在创造一个沙盒类的世界。你是GM，你主要负责推演剧情、叙事事情。世界的默认设定是自主运转的，不会因为任何事情停下，世界会在某时间段产生一些事情、暗流、灾祸等发生，详细类型事情请你自行完善并触发。

【GM 设定摘要】

  if (location) prompt += `

    if (npcNames) prompt += `

function flattenValue(val, indent = 0) {
  const pad = '  '.repeat(indent);
  if (val === null || val === undefined) return `${pad}（无）`;
  if (typeof val === 'string') return `${pad}${val}`;
  if (typeof val === 'number' || typeof val === 'boolean') return `${pad}${String(val)}`;
  if (Array.isArray(val)) {
    if (val.length === 0) return `${pad}（无）`;
    const hasObjectItems = val.some(v => typeof v === 'object' && v !== null);
    if (!hasObjectItems) {
      return val.map(v => flattenValue(v, indent)).join(', ');
    }
    return val.map((v, i) => {
      if (typeof v === 'object' && v !== null) {
        return `${pad}[${i + 1}]\n${flattenValue(v, indent + 1)}`;
      }
      return `${pad}${flattenValue(v, indent)}`;
    }).join('\n');
  }
  if (typeof val === 'object') {
    const entries = Object.entries(val);
    if (entries.length === 0) return `${pad}（空）`;
    return entries.map(([k, v]) => {
      if (typeof v === 'object' && v !== null) {
        return `${pad}${k}:\n${flattenValue(v, indent + 1)}`;
      }
      return `${pad}${k}: ${v}`;
    }).join('\n');
  }
  return `${pad}${String(val)}`;
}

// HTML 版递归展开（用于 renderMemoryView）
function flattenValueHTML(val, depth = 0) {
  const padLeft = depth > 0 ? `style="padding-left:${Math.min(depth * 12, 36)}px"` : '';
  if (val === null || val === undefined) return `<div class="jc-empty" ${padLeft}>（无）</div>`;
  if (typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean') {
    return `<div class="jc-item" ${padLeft}>${escHtml(String(val))}</div>`;
  }
  if (Array.isArray(val)) {
    if (val.length === 0) return `<div class="jc-empty" ${padLeft}>（空）</div>`;
    const hasObjectItems = val.some(v => typeof v === 'object' && v !== null);
    if (!hasObjectItems) {
      return val.map(v => `<div class="jc-item" ${padLeft}>• ${escHtml(String(v))}</div>`).join('');
    }
    return val.map((v, i) => {
      const label = `<div class="jc-item" ${padLeft} style="color:#484f58;font-size:11px;margin-top:2px">#[${i + 1}]</div>`;
      if (typeof v === 'object' && v !== null) {
        return label + flattenValueHTML(v, depth + 1);
      }
      return label + `<div class="jc-item" ${padLeft}>${escHtml(String(v))}</div>`;
    }).join('');
  }
  if (typeof val === 'object') {
    const entries = Object.entries(val);
    if (entries.length === 0) return `<div class="jc-empty" ${padLeft}>（空）</div>`;
    return entries.map(([k, v]) => {
      const keyHtml = `<span class="sub-key">${escHtml(displayKey(k))}</span>`;
      if (typeof v === 'object' && v !== null) {
        return `<div class="jc-item" ${padLeft} style="margin-top:2px">${keyHtml}</div>${flattenValueHTML(v, depth + 1)}`;
      }
      return `<div class="jc-item" ${padLeft}>${keyHtml}${escHtml(String(v))}</div>`;
    }).join('');
  }
  return `<div class="jc-item" ${padLeft}>${escHtml(String(val))}</div>`;
}

function buildPrompt(input, memory, recentHistory) {
  const mode = getMode();
  const worldDesc = memory && memory.世界设定原文 ? memory.世界设定原文 : '';
  const suppressKeys = ['世界设定原文'];
  const isReal = mode === 'real';
  const isFate = mode === 'fate';

  const dataLines = Object.entries(memory || {})
    .filter(([k]) => !suppressKeys.includes(k))
    .map(([key, val]) => {
      const v = flattenValue(val, 0);
      if (typeof val === 'object' && val !== null && !Array.isArray(val) && Object.keys(val).length > 0) {
        return `${key}:\n${v}`;
      }
      return `${key}: ${v}`;
    });
  const dataText = dataLines.length > 0 ? dataLines.join('\n') : '';

  const historyPrefix = (isReal || isFate) ? '观察者' : '玩家';
  const historyText = (recentHistory && recentHistory.length > 0)
    ? recentHistory.map(h => `${historyPrefix}：${h.input}\nGM：${h.narrative}`).join('\n\n')
    : '（无）';

  let worldSection = '';
  if (worldDesc) {
    worldSection = `【当前世界】\n${worldDesc}`;
    if (dataText) worldSection += `\n\n【世界数据】\n${dataText}`;
  } else if (dataText) {
    worldSection = `【当前世界状态】\n${dataText}`;
  } else {
    worldSection = '（无）';
  }

  const actionLabel = (isReal || isFate) ? '【观察者指令】' : '【玩家行动】';
  const footer = isReal
    ? '根据当前世界状态推进。简报式输出，聚焦因果链：谁做了什么→结果是什么→目前局势如何。不渲染环境氛围，不描写感官细节。\n\t【格式】每个NPC/势力/地点段首必须加表情符号，每轮每处都需要。'
    : isFate
      ? '根据当前世界状态推进目标 NPC 的命运线。默认第三人称贴身叙事，可以适当拉远呈现他不知道的阴谋、机缘和外部变化。观察者的干预只能作为外部原因，不能直接改变 NPC 意志。'
      : '根据当前状态和玩家行动推进剧情。基于已有事实延续发展，不重复描写已经建立的环境细节。';

  return `【最近对话】\n${historyText}\n\n${worldSection}\n\n${actionLabel}\n${input}\n\n${footer}\n\n---\n请在叙事结束后输出 STATE 快照（<<STATE>>...<<ENDSTATE>>）\n字段名与上一轮保持一致，不要临时改用新的命名方式描述同一件事。 ---`;
}
// ---------- 解析 AI 输出（叙事 + \`\`\`state JSON```） ----------

function parseAIOutput(text) {
  let narrative = text;
  let state = null;

  // 轻量 JSON 修复：尝试解析，失败时清除尾随逗号后重试
  function tryParse(jsonStr) {
    try { return JSON.parse(jsonStr); }
    catch (e) {
      const fixed = jsonStr.replace(/,\s*([}\]])/g, '$1');
      try { return JSON.parse(fixed); } catch (e2) { return null; }
    }
  }

  // ① 优先找 <<STATE>>...<<ENDSTATE>> 协议标记（最可靠）
  const markerMatch = text.match(/<<STATE>>\s*\n?([\s\S]*?)<<ENDSTATE>>/);
  if (markerMatch) {
    const raw = markerMatch[1].trim();
    state = tryParse(raw);
    // 如果 JSON 解析失败，尝试按 key:value 行解析（AI 有时输出纯文本键值对）
    if (!state) {
      const kvLines = raw.split('\n');
      const kv = {};
      let hasKV = false;
      for (const line of kvLines) {
        const colonIdx = line.indexOf(':');
        if (colonIdx > 0) {
          const k = line.substring(0, colonIdx).trim();
          const v = line.substring(colonIdx + 1).trim();
          if (k && v) { kv[k] = v; hasKV = true; }
        }
      }
      if (hasKV) state = kv;
    }
    narrative = text.replace(markerMatch[0], '').trim();
    // 无论解析成功与否，标记内容已从 narrative 摘除 → 不会露 Bare JSON
    return { narrative, state };
  }

  // ② 找任意 ```...``` 代码块（不限语言标签，不认也清掉）
  const blockMatch = text.match(/```\w*\s*\n?([\s\S]*?)```/);
  if (blockMatch) {
    state = tryParse(blockMatch[1].trim());
    narrative = text.replace(blockMatch[0], '').trim();
    // 同上：解析失败 narrative 也是干净的 — 宁可丢掉一轮 STATE
    return { narrative, state };
  }

  // ③ 末尾 {...} 降级（无代码块时使用）
  const lastClose = text.lastIndexOf('}');
  if (lastClose > 0) {
    const lastOpen = text.lastIndexOf('{', lastClose);
    if (lastOpen >= 0) {
      state = tryParse(text.substring(lastOpen, lastClose + 1));
      if (state) {
        narrative = text.substring(0, lastOpen).trim();
        return { narrative, state };
      }
    }
  }

  return { narrative, state };
}

async function createWorld() {

  };

  // 构建创世界专用配置（如果启用）
  const cfg = JSON.parse(localStorage.getItem('ai_config') || '{}');
  let wcConfig = null;
  if (cfg.wc?.enabled) {
    wcConfig = {
      provider: cfg.wc.provider || cfg.provider,
      endpoint: cfg.wc.endpoint || cfg.endpoint,
      apiKey: cfg.wc.apiKey || cfg.apiKey,
      model: cfg.wc.model || cfg.model
    };
  }

  try {
    const aiText = await callAI(sysPrompt, userPrompt, wcConfig);
    const { narrative, state } = parseAIOutput(aiText);

    // 保存初始状态（含表单固定字段 + 原文）
    if (state) {
      // 固定字段名：确保身份卡能准确读取，不受AI自由措辞影响
      const mode = getMode();
      if (form.world && !state.world && !state.世界观) state.world = form.world;
      if (mode === 'free' && form.player && !state.玩家身份 && !state.玩家) state.玩家身份 = form.player;
      if (form.npcs && !state.NPC && !state.主要NPC) state.NPC = form.npcs;
      const descParts = [];
      if (form.world) descParts.push(`这是一个${form.world}的世界`);
      if (mode === 'free' && form.player) descParts.push(`玩家穿越而来，身份是${form.player}`);
      if (mode === 'fate' && form.npcs) descParts.push(`可跟随的初始 NPC 有${form.npcs}`);
      else if (form.npcs) descParts.push(`玩家认识的人有${form.npcs}`);
      if (form.goals) descParts.push(mode === 'fate' ? `命运观察的大致方向是${form.goals}` : `玩家给出的故事方向大致是${form.goals}`);
      if (form.scene) descParts.push(form.scene);
      state.世界设定原文 = descParts.join('。') + '。';
      updateMemory({}, state);

      // 有 STATE → 正常切主界面
      captureSnapshot(loadMemory());
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';

      const worldName = state.world || '这个';
      appendMessage('narrator', `🤖 ${narrative || `欢迎来到${worldName}世界。你睁开眼睛，周围的一切陌生而真实。`}`);
      renderMemoryView(loadMemory());
      updateTurnCount();
      updateApiStatus();
    } else {
      // STATE 解析失败 → 叙事给了但世界没记住，提示玩家重试
      btn.textContent = '⚠️ 世界已开始但设定未记住';
      setTimeout(() => {
        btn.textContent = '✨ 重新尝试';
        btn.disabled = false;
      }, 3000);
    }

  } catch (err) {
    btn.textContent = `❌ ${err.message.slice(0, 30)}`;
    setTimeout(() => {
      btn.textContent = '✨ 重新尝试';
      btn.disabled = false;
    }, 3000);
  }
}

const SAVE_KEY = 'ai_sandbox_saves';

function getSaves() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)) || []; } catch(e) { return []; }
}
function setSaves(saves) { localStorage.setItem(SAVE_KEY, JSON.stringify(saves)); }

function showSaveModal() {
  const saves = getSaves();
  let html = '';
  for (let i = 0; i < 6; i++) {
    const s = saves[i];
    if (s && s.memory) {
      const t = String(s.title || '存档 ' + (i+1));
      const loc = String(s.location || '未知');
      html += `<div class="save-slot" onclick="doLoad(${i})">
        <div class="slot-label">📖 ${t}</div>
        <div class="slot-info">回合 ${s.turnCount} · ${loc}</div>
      </div>`;
    } else {
      html += `<div class="save-slot" onclick="doSave(${i})">
        <div class="slot-empty">📭 存档 ${i + 1}（空） — 点击保存</div>
      </div>`;
    }
  }
  document.getElementById('save-grid').innerHTML = html;
  document.getElementById('save-modal').classList.add('open');
}

function doSave(idx) {
  const memory = loadMemory();
  if (!memory || Object.keys(memory).length === 0) { alert('还没有世界可保存'); return; }
  // 保存聊天记录（保留剧情）
  const chatHTML = document.getElementById('chat-log').innerHTML;
  const saves = getSaves();
  saves[idx] = {
    title: String(memory.world || '未知').slice(0, 30),
    location: String(memory.location || ''),
    turnCount: document.getElementById('turn-count').textContent || '0',
    memory: JSON.parse(JSON.stringify(memory)),
    recentHistory: loadRecentHistory(),
    chatHTML: chatHTML,
    savedAt: Date.now()
  };
  setSaves(saves);
  document.getElementById('save-modal').classList.remove('open');
  alert('已保存到存档 ' + (idx + 1));
}

function doLoad(idx) {
  const saves = getSaves();
  const s = saves[idx];
  if (!s || !s.memory) return;
  if (!confirm(`读档「${s.title}」？当前进度将被覆盖。`)) return;
  // 保存 memory + 最近对话历史 + 聊天记录 + 回合数 → 刷新
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s.memory));
  localStorage.setItem(HISTORY_KEY, JSON.stringify(s.recentHistory || []));
  localStorage.setItem('load_turn', String(s.turnCount || '0'));
  if (s.chatHTML) localStorage.setItem('load_chat', s.chatHTML);
  document.getElementById('save-modal').classList.remove('open');
  location.reload();
}

function exportMemory() {
  const memory = loadMemory();
  if (!memory || Object.keys(memory).length === 0) { alert('没有记忆可导出'); return; }
  const blob = new Blob([JSON.stringify({ memory, recentHistory: loadRecentHistory() }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');

  a.download = `sandbox-memory-${Date.now()}.json`;

function importMemory(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.memory && typeof data.memory === 'object') {
        saveMemory(data.memory);
        if (data.recentHistory) localStorage.setItem(HISTORY_KEY, JSON.stringify(data.recentHistory));
        document.getElementById('chat-log').innerHTML = '';
        document.getElementById('turn-count').textContent = '0';
        location.reload();
      } else {
        alert('无效的记忆文件：缺少 memory 字段');
      }
    } catch (err) {
      alert('文件解析失败：' + err.message);
    }
  };
  reader.readAsText(file);
}

// ---------- 更新 Memory（全量替换：STATE 是完整快照） ----------

function updateMemory(oldMemory, newState) {
  if (!newState || typeof newState !== 'object' || Object.keys(newState).length === 0) {
    return false; // 没有有效状态，不更新
  }
  // 保护系统字段：世界设定原文是玩家表单生成的静态锚点，不是 AI 的输出字段
  // AI 不会在 STATE 中回传它，所以全量替换前先保留，替换后合并回去
  const preservedDesc = oldMemory.世界设定原文 || null;

  // 全量替换：STATE 是完整快照，不在 STATE 中的旧字段自然废弃
  Object.keys(oldMemory).forEach(k => delete oldMemory[k]);
  Object.assign(oldMemory, newState);

  // 系统字段不受 AI 输出影响，合并回去
  if (preservedDesc) oldMemory.世界设定原文 = preservedDesc;

  saveMemory(oldMemory);
  return true;
}

// ---------- 战斗结算（唯一由程序计算胜负的地方，规则见 combatProtocol） ----------

const COMBAT_DEFAULT_STATS = { 生命: 20, 攻击: 5, 防御: 3, 速度: 5 };
const COMBAT_MAX_ROUNDS = 500;

// 元素克制表由AI按世界观自行声明（谁克谁、倍率多少），程序只查表不判断内容是否合理
function buildElementCounterMap(counters) {
  const map = new Map();
  if (Array.isArray(counters)) {
    counters.forEach(entry => {
      if (entry && entry.克制方 && entry.被克方 && Number.isFinite(entry.倍率)) {
        map.set(`${entry.克制方}→${entry.被克方}`, entry.倍率);
      }
    });
  }
  return map;
}

function elementMultiplier(counterMap, attackerElements, targetElements) {
  if (!counterMap.size || !Array.isArray(attackerElements) || !Array.isArray(targetElements)) return 1;
  let best = 1;
  attackerElements.forEach(a => {
    targetElements.forEach(t => {
      const mult = counterMap.get(`${a}→${t}`);
      if (Number.isFinite(mult) && mult > best) best = mult;
    });
  });
  return best;
}

// 薄兜底：AI 有时会把协议字段名写成英文变体，这里只认实测中出现过的高频写法，
// 只在标准中文字段缺失且别名字段存在时才搬运，不做穷举式猜测
const COMBAT_FIELD_ALIASES = {
  战斗: ['combat', 'battle'],
  战斗属性: ['combat_attributes', 'combatStats', 'battle_stats'],
  元素克制: ['element_crushing', 'element_system', 'elemental_counters']
};

function normalizeCombatFieldAliases(memory) {
  if (!memory || typeof memory !== 'object') return;
  Object.entries(COMBAT_FIELD_ALIASES).forEach(([canonical, aliases]) => {
    if (memory[canonical] !== undefined) return;
    for (const alias of aliases) {
      if (memory[alias] !== undefined) {
        memory[canonical] = memory[alias];
        delete memory[alias];
        break;
      }
    }
  });
}

function resolveCombat(sides, statsMap, elementCounters) {
  const stats = statsMap || {};
  const sideNames = Object.keys(sides || {});
  if (sideNames.length !== 2) return null;
  const counterMap = buildElementCounterMap(elementCounters);

  const fighters = [];
  sideNames.forEach(sideName => {
    const names = Array.isArray(sides[sideName]) ? sides[sideName] : [];
    names.forEach(name => {
      const base = stats[name] || {};
      fighters.push({
        name,
        side: sideName,
        生命: Number.isFinite(base.生命) ? base.生命 : COMBAT_DEFAULT_STATS.生命,
        攻击: Number.isFinite(base.攻击) ? base.攻击 : COMBAT_DEFAULT_STATS.攻击,
        防御: Number.isFinite(base.防御) ? base.防御 : COMBAT_DEFAULT_STATS.防御,
        速度: Number.isFinite(base.速度) ? base.速度 : COMBAT_DEFAULT_STATS.速度,
        元素: Array.isArray(base.元素) ? base.元素 : [],
        技能加成: Number.isFinite(base.技能加成) ? base.技能加成 : 0
      });
    });
  });
  if (fighters.length === 0) return null;

  fighters.sort((a, b) => b.速度 - a.速度);
  const log = [];
  let rounds = 0;

  function aliveOf(sideName) {
    return fighters.filter(f => f.side === sideName && f.生命 > 0);
  }

  while (rounds < COMBAT_MAX_ROUNDS) {
    const [sideA, sideB] = sideNames;
    if (aliveOf(sideA).length === 0 || aliveOf(sideB).length === 0) break;

    for (const attacker of fighters) {
      if (attacker.生命 <= 0) continue;
      const enemySide = attacker.side === sideA ? sideB : sideA;
      const enemies = aliveOf(enemySide);
      if (enemies.length === 0) break;

      const target = enemies.reduce((weakest, f) => f.生命 < weakest.生命 ? f : weakest, enemies[0]);
      const rawAttack = attacker.攻击 + attacker.技能加成;
      const multiplier = elementMultiplier(counterMap, attacker.元素, target.元素);
      const damage = Math.max(1, Math.round(rawAttack * multiplier) - target.防御);
      target.生命 -= damage;
      const multNote = multiplier > 1 ? `（元素克制×${multiplier}）` : '';
      log.push(`${attacker.name} 对 ${target.name} 造成 ${damage} 点伤害${multNote}`);
      if (target.生命 <= 0) log.push(`💀 ${target.name} 倒下`);

      if (aliveOf(sideA).length === 0 || aliveOf(sideB).length === 0) break;
    }
    rounds++;
  }

  const [sideA, sideB] = sideNames;
  const aliveA = aliveOf(sideA).length > 0;
  const aliveB = aliveOf(sideB).length > 0;
  const winner = aliveA && !aliveB ? sideA : (!aliveA && aliveB ? sideB : null);
  const fallen = fighters.filter(f => f.生命 <= 0).map(f => f.name);

  // 技能加成是单场战斗的临时加值，结算后不写回，避免自动累加到下一场
  const updatedStats = {};
  fighters.forEach(f => {
    updatedStats[f.name] = { 生命: Math.max(0, f.生命), 攻击: f.攻击, 防御: f.防御, 速度: f.速度 };
    if (f.元素.length > 0) updatedStats[f.name].元素 = f.元素;
  });

  return { log, winner, fallen, updatedStats };
}

function formatBattleLog(result) {
  const lines = ['⚔️ 战斗结算'];
  lines.push(...result.log);
  if (result.winner) {
    lines.push(`🏆 ${result.winner} 获胜`);
  } else {
    lines.push('🏳️ 战斗未分出胜负');
  }
  if (result.fallen.length > 0) {
    lines.push(`阵亡：${result.fallen.join('、')}`);
  }
  return lines.join('\n');
}

// ---------- 真实 AI 调用 ----------

async function realAI(input, memory, recentHistory) {
  const sysPrompt = systemPrompt(memory);
  const userPrompt = buildPrompt(input, memory, recentHistory);
  appendMessage('memory-ref', '⏳ AI 思考中……');
  disableInput(true);

  try {
    const aiText = await callAI(sysPrompt, userPrompt);
    removeLastMessage();
    const { narrative, state } = parseAIOutput(aiText);
    return { text: narrative, state };
  } catch (err) {
    removeLastMessage();
    appendMessage('memory-ref', `❌ AI 调用失败：${err.message}`);
    disableInput(false);
    // 降级到 mockAI（只回复，不改变记忆）
    appendMessage('memory-ref', '🔄 降级到本地 Mock AI……');
    return mockAI(input, memory);
  }
}

function disableInput(disabled) {
  document.getElementById('user-input').disabled = disabled;
  document.getElementById('send-btn').disabled = disabled;
}

function removeLastMessage() {
  const log = document.getElementById('chat-log');
  if (log.lastChild) log.removeChild(log.lastChild);
}

  const config = {
    provider: document.getElementById('cfg-provider').value,
    endpoint: document.getElementById('cfg-endpoint').value.trim(),
    apiKey: document.getElementById('cfg-key').value.trim(),
    model: getModelValue('cfg-')
  };

  // 创世界专用配置
  const wcEnabled = document.getElementById('cfg-wc-enable').checked;
  if (wcEnabled) {
    config.wc = {
      enabled: true,
      provider: document.getElementById('cfg-wc-provider').value,
      endpoint: document.getElementById('cfg-wc-endpoint').value.trim(),
      apiKey: document.getElementById('cfg-wc-key').value.trim(),
      model: getModelValue('cfg-wc-')
    };
  } else {
    delete config.wc;
  }

  localStorage.setItem('ai_config', JSON.stringify(config, null, 2));
  closeSettings();
  updateApiStatus();
}

async function testConnection() {
  const btn = document.getElementById('settings-test');
  btn.textContent = '⏳ 测试中...';
  btn.disabled = true;

  const provider = document.getElementById('cfg-provider').value;
  const endpoint = document.getElementById('cfg-endpoint').value.trim();
  const apiKey = document.getElementById('cfg-key').value.trim();
  const model = getModelValue('cfg-');

  if (!apiKey) { btn.textContent = '❌ 未填 Key'; btn.disabled = false; return; }

  try {
    if (provider === 'gemini') {
      const url = endpoint.replace(/\/+$/, '') + '/v1beta/models/' + (model || 'gemini-2.0-flash') + ':generateContent?key=' + apiKey;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: 'hi' }] }] })
      });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error?.message || 'HTTP ' + res.status); }
    } else {
      const url = endpoint; // 完整 URL
      const body = { model: model || 'deepseek-chat', messages: [{ role: 'user', content: 'hi' }], max_tokens: 10 };
      if (provider === 'sf') body.enable_thinking = false;
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const t = await res.text(); throw new Error('HTTP ' + res.status + ': ' + t.slice(0, 100)); }
    }
    btn.textContent = '✅ 连接成功';
  } catch (e) {
    btn.textContent = '❌ ' + e.message.slice(0, 35);
  }
  btn.disabled = false;
  setTimeout(() => { if (btn.textContent.includes('✅') || btn.textContent.includes('❌')) btn.textContent = '🔌 测试连接'; }, 3000);
}

function updateApiStatus() {
  const el = document.getElementById('api-status');
  const cfg = JSON.parse(localStorage.getItem('ai_config') || '{}');
  if (cfg.apiKey) {
    el.className = 'ok';
    const masked = cfg.apiKey.slice(0, 6) + '…' + cfg.apiKey.slice(-4);

}

/** 排序 key 后 stringify，避免对象字段顺序不同导致的误报 */
function sortedStringify(val) {
  if (typeof val === 'object' && val !== null) {
    if (Array.isArray(val)) {
      return '[' + val.map(v => sortedStringify(v)).join(',') + ']';
    }
    const sorted = Object.keys(val).sort().reduce((acc, k) => {
      acc[k] = JSON.parse(sortedStringify(val[k]));
      return acc;
    }, {});
    return JSON.stringify(sorted);
  }
  return JSON.stringify(val);
}

let _prevMemory = null; // AI 调用前的记忆快照
let _memoryStack = [];   // STATE 历史栈（用于撤回）

const STACK_KEY = 'ai_sandbox_stack';

function saveStack() {
  try { localStorage.setItem(STACK_KEY, JSON.stringify(_memoryStack)); } catch (e) { /* ignore */ }
}
function loadStack() {
  try {
    const raw = localStorage.getItem(STACK_KEY);
    if (raw) _memoryStack = JSON.parse(raw);
  } catch (e) { _memoryStack = []; }
}
function clearStack() {
  _memoryStack = [];
  localStorage.removeItem(STACK_KEY);
}

function captureSnapshot(memory) {
  _prevMemory = JSON.parse(JSON.stringify(memory));
}

function computeDiff(oldMem, newMem) {
  if (!oldMem || Object.keys(oldMem).length === 0) return null;
  const changes = [];
  const allKeys = [...new Set([...Object.keys(oldMem), ...Object.keys(newMem)])];
  for (const key of allKeys) {
    const oldVal = oldMem[key];
    const newVal = newMem[key];
    if (newVal === undefined) {
      changes.push({ type: 'removed', key, oldVal });
    } else if (oldVal === undefined) {
      changes.push({ type: 'added', key, newVal });
    } else if (sortedStringify(oldVal) !== sortedStringify(newVal)) {
      changes.push({ type: 'changed', key, oldVal, newVal });
    }
  }
  return changes.length > 0 ? changes : null;
}

function renderDiff(changes) {
  const el = document.getElementById('memory-view');
  if (!changes) return;
  const items = changes.map(c => {
    const key = escHtml(displayKey(c.key));
    if (c.type === 'added') return `<div class="jc-item is-new">✨ ${key}：${escHtml(flattenValue(c.newVal, 0).slice(0, 60))}</div>`;
    if (c.type === 'removed') return `<div class="jc-item" style="color:#da3633">🗑️ ${key}</div>`;
    if (c.type === 'changed') return `<div class="jc-item is-changed">🔄 ${key}</div>`;
    return '';
  }).join('');

  const diffHtml = `<div class="journal-card diff-card">
    <div class="jc-header">
      <span class="jc-title">📋 本轮更新</span>
      <span class="jc-count">${changes.length}</span>
    </div>
    <div class="jc-body">${items}</div>
  </div>`;

  el.insertAdjacentHTML('afterbegin', diffHtml);
}

// ---------- 世界日志（卡片式） ----------

function renderMemoryView(memory) {
  const el = document.getElementById('memory-view');
  if (!memory || Object.keys(memory).length === 0) {
    el.innerHTML = '<div style="text-align:center;padding:20px;color:#484f58">🌍 等待世界诞生……</div>';
    return;
  }

  // 分类
  const boolFlags = [], worldInfo = [], characters = [], envCards = [], rest = [];
  const isCharObj = v => typeof v === 'object' && v !== null && !Array.isArray(v) &&
    Object.keys(v).some(k => /location|state|status|位|状|emotion|情绪/i.test(k));
  const infoKeys = ['world', '世界观', '世界', 'time', '时间', 'date', '日期', 'season', 'age', 'identity', '身份', 'player', 'location', '位置', '地点', 'current_location', 'state', '状态', 'world_state'];
  const envKeys = ['environment', '环境', 'weather', '天气', 'town_activity', 'current_events', 'state_of_affairs'];  const nestedCharKeys = ['known_characters', 'key_characters', 'NPC', 'npc', '角色', '主要角色'];

  for (const [key, val] of Object.entries(memory)) {
    if (typeof val === 'boolean') { boolFlags.push([key, val]); }
    else if (isCharObj(val)) { characters.push([key, val]); }
    else if (infoKeys.includes(key)) { worldInfo.push([key, val]); }
    else if (envKeys.includes(key)) { envCards.push([key, val]); }
    else { rest.push([key, val]); }
  }

  let html = '';

  // 收集哪些分组有内容，决定分隔线
  const hasWorld = worldInfo.length > 0;
  const hasChars = characters.length > 0;
  const hasNested = rest.some(([k]) => nestedCharKeys.includes(k));
  const hasEnv = envCards.length > 0;
  const hasFlags = boolFlags.length > 0;
  const restFiltered = rest.filter(([k]) => !nestedCharKeys.includes(k));
  const hasRest = restFiltered.length > 0;
  const sections = [hasWorld, hasChars, hasNested, hasEnv, hasFlags, hasRest].filter(Boolean).length;

  // ① 世界基本信息
  if (hasWorld) {
    if (sections > 1) html += `<div style="font-size:10px;color:#484f58;padding:4px 0 2px 2px;letter-spacing:1px">🌍 基本信息</div>`;
    for (const [key, val] of worldInfo) {
      html += renderCard(displayKey(key), val);
    }
  }

  // ② 角色卡片（带 icon 和摘要行）
  if (hasChars) {
    if (hasWorld) html += sectionDivider();
    if (sections > 1) html += `<div style="font-size:10px;color:#484f58;padding:4px 0 2px 2px;letter-spacing:1px">👤 角色</div>`;
    for (const [key, val] of characters) {
      const icon = key === 'player' || key === '玩家角色' || key === 'identity' ? '🧑' : '👤';
      const sub = typeof val === 'object' && val ? val : null;
      let summary = '';
      if (sub) {
        const loc = sub.location || sub.当前位置 || sub.位置 || '';
        const st = sub.state || sub.状态 || '';
        const em = sub.visible_emotion || sub.情绪 || '';
        if (loc) summary += `<span class="jc-loc">📍${escHtml(loc)}</span>`;
        if (st) summary += ` <span class="jc-summary">${escHtml(st)}</span>`;
      }
      html += `<div class="journal-card">
        <div class="jc-header" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.jc-toggle').textContent=this.nextElementSibling.classList.contains('collapsed')?'▶':'▼'">
          <span class="jc-title">${icon} ${escHtml(displayKey(key))}</span>
          ${summary ? `<span class="jc-subtitle">${summary}</span>` : ''}
          <span class="jc-toggle">▼</span>
        </div>
        <div class="jc-body">${flattenValueHTML(val, 0)}</div>
      </div>`;
    }
  }

  // ③ 嵌套角色（known_characters 等）
  if (hasNested) {
    if (hasChars || hasWorld) html += sectionDivider();
    if (sections > 1) html += `<div style="font-size:10px;color:#484f58;padding:4px 0 2px 2px;letter-spacing:1px">👥 角色一览</div>`;
    for (const [key, val] of rest.filter(([k]) => nestedCharKeys.includes(k))) {
      if (typeof val === 'object' && val !== null) {
        for (const [subKey, subVal] of Object.entries(val)) {
          const icon = subKey === 'player' || subKey === '玩家' ? '🧑' : '👤';
          let summary = '';
          if (typeof subVal === 'object' && subVal) {
            const loc = subVal.location || subVal.位置 || '';
            const st = subVal.state || subVal.status || subVal.状态 || '';
            if (loc) summary += `<span class="jc-loc">📍${escHtml(loc)}</span>`;
            if (st) summary += ` <span class="jc-summary">${escHtml(st)}</span>`;
          }
          html += `<div class="journal-card">
            <div class="jc-header" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.jc-toggle').textContent=this.nextElementSibling.classList.contains('collapsed')?'▶':'▼'">
              <span class="jc-title">${icon} ${escHtml(displayKey(subKey))}</span>
              ${summary ? `<span class="jc-subtitle">${summary}</span>` : ''}
              <span class="jc-toggle">▼</span>
            </div>
            <div class="jc-body">${flattenValueHTML(subVal, 0)}</div>
          </div>`;
        }
      }
    }
  }

  // ④ 环境
  if (hasEnv) {
    if (hasNested || hasChars || hasWorld) html += sectionDivider();
    if (sections > 1) html += `<div style="font-size:10px;color:#484f58;padding:4px 0 2px 2px;letter-spacing:1px">🌤️ 环境</div>`;
    for (const [key, val] of envCards) {
      html += renderCard(displayKey(key), val);
    }
  }

  // 从 rest 中移除已处理的嵌套角色 — 前面已计算 restFiltered

  // ⑤ 布尔标记（合并为一行标签）
  if (hasFlags) {
    if (hasEnv || hasNested || hasChars || hasWorld) html += sectionDivider();
    if (sections > 1) html += `<div style="font-size:10px;color:#484f58;padding:4px 0 2px 2px;letter-spacing:1px">🏷️ 标记</div>`;
    const tags = boolFlags.map(([k, v]) =>
      `<span class="jc-flag ${v ? 'on' : 'off'}">${escHtml(displayKey(k))}</span>`
    ).join(' ');
    html += `<div class="journal-card"><div class="jc-header" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.jc-toggle').textContent=this.nextElementSibling.classList.contains('collapsed')?'▶':'▼'">
      <span class="jc-title">⚑ 标记</span><span class="jc-count">${boolFlags.length}</span><span class="jc-toggle">▼</span>
    </div><div class="jc-body" style="display:flex;flex-wrap:wrap;gap:4px;padding-top:6px">${tags}</div></div>`;
  }

  // ⑥ 其他
  if (hasRest) {
    if (hasFlags || hasEnv || hasNested || hasChars || hasWorld) html += sectionDivider();
    if (sections > 1) html += `<div style="font-size:10px;color:#484f58;padding:4px 0 2px 2px;letter-spacing:1px">📦 其他</div>`;
    for (const [key, val] of restFiltered) {
      html += renderCard(displayKey(key), val);
    }
  }

  el.innerHTML = html;
}

function sectionDivider() {
  return `<div style="height:1px;background:#21262d;margin:8px 0"></div>`;
}

function renderCard(title, val) {
  let count = '';
  if (Array.isArray(val)) count = val.length;
  else if (typeof val === 'object' && val !== null) count = Object.keys(val).length;
  return `<div class="journal-card">
    <div class="jc-header" onclick="this.nextElementSibling.classList.toggle('collapsed');this.querySelector('.jc-toggle').textContent=this.nextElementSibling.classList.contains('collapsed')?'▶':'▼'">
      <span class="jc-title">${escHtml(title)}</span>
      ${count ? `<span class="jc-count">${count}</span>` : ''}
      <span class="jc-toggle">▼</span>
    </div>
    <div class="jc-body">${flattenValueHTML(val, 0)}</div>
  </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function appendMessage(type, text) {
  const log = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = `msg ${type}`;

  const ts = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  const body = formatText(text, type);
  div.innerHTML = `<span class="ts">${ts}</span>${body}`;

  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function formatText(text, type) {
  if (type === 'combat') return inlineBr(escHtml(text));
  if (type !== 'narrator') return escHtml(text);

  let html = escHtml(text);

  // 对话：中文「」或 "" 内着色
  html = html.replace(/「([^」]*)」/g, '<span class="dialogue">「$1」</span>');

  // 段落：双换行 → <p>
  const paragraphs = html.split(/\n\s*\n/);
  if (paragraphs.length > 1) {
    html = paragraphs.map(p => p.trim() ? `<p>${inlineBr(p)}</p>` : '').join('');
  } else {
    html = `<p>${inlineBr(html)}</p>`;
  }

  return html;
}

function inlineBr(s) {
  return s.replace(/\n/g, '<br>');
}

function updateTurnCount() {
  const el = document.getElementById('turn-count');
  const current = parseInt(el.textContent, 10) || 0;
  el.textContent = current + 1;
}

// ---------- 撤回 ----------

function retractTurn() {
  const userMsgs = document.querySelectorAll('#chat-log .msg.user');
  const lastMsg = userMsgs[userMsgs.length - 1];
  if (!lastMsg) return;

  // 删除最后一条用户消息及其之后的所有消息
  let el = lastMsg;
  const siblings = [];
  while (el) { siblings.push(el); el = el.nextElementSibling; }
  for (let i = siblings.length - 1; i >= 0; i--) siblings[i].remove();

  // 弹出最近一轮历史
  const history = loadRecentHistory();
  if (history.length > 0) history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));

  // 恢复 STATE
  if (_memoryStack.length > 0) {
    const prev = JSON.parse(JSON.stringify(_memoryStack.pop()));
    saveMemory(prev);
    renderMemoryView(prev);
  }

  // 回合数减一
  const turnEl = document.getElementById('turn-count');
  const current = parseInt(turnEl.textContent, 10) || 0;
  if (current > 0) turnEl.textContent = current - 1;
}

// ---------- 主循环 ----------

async function submitAction() {
  const inputEl = document.getElementById('user-input');
  const input = inputEl.value.trim();
  if (!input) return;
  inputEl.value = '';

  // 撤回命令
  if (input === '撤回') { retractTurn(); return; }

  // 1. 显示用户输入（根据模式切换图标）
  const mode = getMode();
  const userIcon = mode === 'real' ? '👁️' : mode === 'fate' ? '🧿' : '🧑';
  appendMessage('user', `${userIcon} ${input}`);

  // 2. 加载记忆 + 最近对话历史 + 快照
  const memory = loadMemory();
  const recentHistory = loadRecentHistory();
  captureSnapshot(memory);
  _memoryStack.push(JSON.parse(JSON.stringify(memory)));
  saveStack(); // 持久化撤回栈，刷新页面后仍可用

  // 3. AI 生成
  let result;
  try {
    const hasKey = !!(JSON.parse(localStorage.getItem('ai_config') || '{}').apiKey);
    result = hasKey ? await realAI(input, memory, recentHistory) : mockAI(input, memory);
  } catch (e) {
    disableInput(false);
    appendMessage('memory-ref', `❌ ${e.message || '出错了'}`);
    return;
  }

  // 4. 重新启用输入
  disableInput(false);

  // 5. 显示 AI 叙事（空则补默认提示）
  appendMessage('narrator', `🤖 ${result.text || '世界安静地运转着。你感受到周围的一切都在继续。'}`);

  // 6. 更新 Memory
  if (result.state) {
    const changed = updateMemory(memory, result.state);
    if (changed) {
      appendMessage('memory-ref', '🧠 记忆已更新');
    }
  }

  // 6.5 战斗结算（程序计算胜负，AI 只声明参战方，见 combatProtocol）
  // 薄兜底：AI 偶尔会把协议字段名换成英文变体，识别几个实测出现过的高频写法，
  // 不做开放式猜测——治根方案是 combatProtocol() 里已加的固定字段名约束
  normalizeCombatFieldAliases(memory);
  if (memory.战斗) {
    const combatResult = resolveCombat(memory.战斗, memory.战斗属性, memory.元素克制);
    delete memory.战斗;
    if (combatResult) {
      memory.战斗属性 = Object.assign({}, memory.战斗属性, combatResult.updatedStats);
      memory.战斗结果 = combatResult.winner
        ? `${combatResult.winner} 获胜${combatResult.fallen.length > 0 ? '，阵亡：' + combatResult.fallen.join('、') : ''}`
        : '战斗未分出胜负';
      appendMessage('combat', formatBattleLog(combatResult));
    }
    saveMemory(memory);
  }

  // 7. 追加本轮原始对话到滑动窗口
  pushRecentHistory(input, result.text);

  // 8. 刷新面板 + 本轮变化
  renderMemoryView(memory);
  const diff = computeDiff(_prevMemory, memory);
  if (diff) renderDiff(diff);
  updateTurnCount();
}

// ---------- 初始化 ----------

function init() {
  // 恢复撤回栈（刷新页面后用撤回不会 STATE 不回滚）
  loadStack();

  // 读取读档时保存的回合数和聊天记录
  const loadTurn = localStorage.getItem('load_turn');
  if (loadTurn) {
    document.getElementById('turn-count').textContent = loadTurn;
    localStorage.removeItem('load_turn');
  }
  const loadChat = localStorage.getItem('load_chat');
  if (loadChat) {
    document.getElementById('chat-log').innerHTML = loadChat;
    localStorage.removeItem('load_chat');
  }

  const memory = loadMemory();
  const hasMemory = Object.keys(memory).length > 0;
  const chatRestored = !!document.getElementById('chat-log').innerHTML.trim();
  renderMemoryView(memory);
  updateApiStatus();
  if (hasMemory) captureSnapshot(memory); // 已有世界 → 初始化 diff 基准

  if (hasMemory) {
    // 有存档 → 跳过创世界，直接进入
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';

    // 如果恢复了聊天记录，不再加欢迎语（避免重复）
    if (!chatRestored) {
      if (memory.world) {
        appendMessage('memory-ref', `🧠 记忆已载入 — ${Object.keys(memory).length} 个字段`);
        appendMessage('narrator', `🤖 你回到【${memory.world}】。世界还在原来的地方等你。`);
      } else {
        appendMessage('memory-ref', `🧠 ${Object.keys(memory).length} 条记忆已载入`);
        appendMessage('narrator', '🤖 你回来了。世界还在原来的地方等你。');
      }
    }
  } else {
    // 新玩家 → 显示创世界面
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('app').style.display = 'none';
  }

  // 发送（仅在聊天模式有效）
  document.getElementById('send-btn').addEventListener('click', submitAction);
  document.getElementById('user-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitAction();
  });

  // 创世界
  document.getElementById('btn-create-world').addEventListener('click', createWorld);

  // 设置面板
  document.getElementById('settings-btn').addEventListener('click', openSettings);
  document.getElementById('settings-save').addEventListener('click', saveSettingsFromForm);
  document.getElementById('settings-test').addEventListener('click', testConnection);
  document.getElementById('settings-cancel').addEventListener('click', closeSettings);
  document.getElementById('settings-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeSettings();
  });

  // 模式切换
  function updateModeUI() {
    const mode = getMode();
    const isReal = mode === 'real';
    const isFate = mode === 'fate';
    // 上帝/命运跟随：观察者不在世界内，隐藏"玩家"字段
    const playerField = document.getElementById('sw-player-field');
    if (playerField) playerField.style.display = (isReal || isFate) ? 'none' : 'block';
    const isRpg = mode === 'rpg';
    const hint = document.getElementById('mode-hint');
    if (isReal) {
      hint.textContent = '👁️ 上帝模式 — 设定世界，观察因果';
    } else if (isFate) {
      hint.textContent = '🧿 命运跟随 — 绑定 NPC 命运线，观察选择与因果';
    } else if (isRpg) {
      hint.textContent = '⚔️ RPG冒险 — 探索、战斗、成长，战斗数值由程序结算';
    } else {
      hint.textContent = '世界里可以有好人坏人，善恶都要有来处';
    }
    // 修改用户输入框 placeholder
    const input = document.getElementById('user-input');
    if (input) {
      input.placeholder = isReal ? '观察世界 / 施加干预...'
        : isFate ? '跟随某个 NPC / 投放机缘或阻碍...'
        : isRpg ? '输入你的行动（探索/战斗/交谈）...'
        : '输入你的行为...';
    }
    // RPG 模式：创世界表单占位符换成冒险向示例，其余模式保持原文案
    const npcsField = document.getElementById('sw-npcs');
    const goalsField = document.getElementById('sw-goals');
    const sceneField = document.getElementById('sw-scene');
    if (npcsField) npcsField.placeholder = isRpg ? '铁匠老雷（打造装备）、旅店老板娘小芸…' : '酒保老张（情报贩子）、神秘委托人…';
    if (goalsField) goalsField.placeholder = isRpg ? '从新人做到能独立接高阶委托 / 集齐传说装备 / 击败魔王…' : '调查失踪案 / 成为冠军 / 揭开阴谋…';
    if (sceneField) sceneField.placeholder = isRpg ? '刚拿到冒险者执照走出公会 / 在边境小镇苏醒…' : '在出租屋醒来 / 穿越到陌生世界…';
    // RPG 模式专属：快捷行动条
    const quickActions = document.getElementById('rpg-quick-actions');
    if (quickActions) quickActions.style.display = isRpg ? 'flex' : 'none';
  }

  const RPG_QUICK_ACTION_TEXT = {
    explore: '我在周围四处探索一下，看看有什么发现',
    quest: '我想去找人接个委托或任务做',
    encounter: '我继续往前走，看看路上会遇到什么',
    fight: '我主动寻找冲突，找人打一场',
    talk: '我想找附近的人聊聊，打听点消息',
    rest: '我找个地方休整一下，恢复状态'
  };
  document.getElementById('rpg-quick-actions').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const text = RPG_QUICK_ACTION_TEXT[btn.dataset.action];
    if (!text) return;
    const input = document.getElementById('user-input');
    input.value = text;
    input.focus();
  });

  function setActiveModeButton(mode) {
    document.getElementById('mode-free').classList.toggle('active', mode === 'free');
    document.getElementById('mode-real').classList.toggle('active', mode === 'real');
    document.getElementById('mode-fate').classList.toggle('active', mode === 'fate');
    document.getElementById('mode-rpg').classList.toggle('active', mode === 'rpg');
  }

  const savedMode = getMode();
  setActiveModeButton(savedMode);
  updateModeUI(); // 模式对应的表单/输入框状态
  document.getElementById('mode-free').addEventListener('click', () => {
    setMode('free');
    setActiveModeButton('free');
    updateModeUI();
  });
  document.getElementById('mode-real').addEventListener('click', () => {
    setMode('real');
    setActiveModeButton('real');
    updateModeUI();
  });
  document.getElementById('mode-fate').addEventListener('click', () => {
    setMode('fate');
    setActiveModeButton('fate');
    updateModeUI();
  });
  document.getElementById('mode-rpg').addEventListener('click', () => {
    setMode('rpg');
    setActiveModeButton('rpg');
    updateModeUI();
  });

  // 存档读档
  document.getElementById('btn-save').addEventListener('click', showSaveModal);
  document.getElementById('btn-load').addEventListener('click', showSaveModal);
  document.getElementById('btn-save-close').addEventListener('click', () => closeModal('save-modal'));
  document.getElementById('save-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeModal('save-modal');
  });

  // 导入导出
  document.getElementById('export-btn').addEventListener('click', exportMemory);
  document.getElementById('import-btn').addEventListener('click', () => document.getElementById('import-file').click());
  document.getElementById('import-file').addEventListener('change', function(e) {
    if (e.target.files.length > 0) importMemory(e.target.files[0]);
    e.target.value = '';
  });

  // 清除记忆
  document.getElementById('clear-btn').addEventListener('click', () => {
    if (confirm('清除所有记忆？这将重新开始。')) {
      clearMemory();
      clearRecentHistory();
      clearStack();
      document.getElementById('chat-log').innerHTML = '';
      document.getElementById('turn-count').textContent = '0';
      init();
    }
  });
}

init();
</script>
</body>
</html>
