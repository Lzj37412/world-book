name: Deploy to Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to gh-pages
        run: |
          cp -r ./* ./.* /tmp/deploy/ 2>/dev/null || true
          mkdir -p /tmp/deploy
          cp index.html /tmp/deploy/
          cp -r ai /tmp/deploy/ 2>/dev/null || true
          cp README.md /tmp/deploy/ 2>/dev/null || true
          cp .nojekyll /tmp/deploy/ 2>/dev/null || true
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
